<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Retro Camera</title>
  <meta
    name="description"
    content="Redirecting to the latest Retro Camera revamp."
  >
  <style>
    :root {
      color-scheme: light;
      --bg: #f6efe5;
      --card: rgba(255, 250, 241, 0.94);
      --ink: #2a2018;
      --muted: #6e6156;
      --accent: #d06e4f;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.6), transparent 28%),
        linear-gradient(135deg, var(--bg), #ecdcc4 55%, #e3cfb1);
      color: var(--ink);
      font-family: Arial, sans-serif;
    }

    main {
      width: min(100%, 560px);
      padding: 28px;
      border-radius: 24px;
      background: var(--card);
      border: 1px solid rgba(60, 38, 18, 0.08);
      box-shadow: 0 24px 48px rgba(53, 35, 16, 0.12);
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(1.8rem, 4vw, 2.4rem);
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
    }

    .links {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 0 16px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 700;
      border: 1px solid rgba(60, 38, 18, 0.12);
      color: var(--ink);
      background: rgba(255, 255, 255, 0.82);
    }

    a.primary {
      background: linear-gradient(135deg, var(--accent), #a9482f);
      color: #fff8f2;
      border: none;
    }
  </style>
  <script>
    (() => {
      const target = new URL("./revamp/index.html", window.location.href);
      target.search = window.location.search;
      target.hash = window.location.hash;
      window.location.replace(target.toString());
    })();
  </script>
</head>
<body>
  <main>
    <h1>Redirecting to the latest Retro Camera build.</h1>
    <p>
      If the redirect does not happen automatically, open the latest revamp or
      the classic camera below.
    </p>
    <div class="links">
      <a class="primary" href="./revamp/index.html">Open Latest App</a>
      <a href="./retro-camera.html">Open Classic Camera</a>
    </div>
  </main>
</body>
</html>
